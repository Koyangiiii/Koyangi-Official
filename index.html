<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K0yangiii - Pinky Soft Edition</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Mitr:wght@200;300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Mitr', 'sans-serif'] },
                    colors: {
                        cream: '#FFF1F3',
                        pinky: { 
                            light: '#FFDCE2',
                            DEFAULT: '#FFB6C1',
                            dark: '#FF8FAB'
                        },
                        brown: { 
                            light: '#B0808C',
                            DEFAULT: '#8A5C68',
                            dark: '#6F434F'
                        },
                        ui: {
                            white: '#FFFFFF',
                            icon: '#FFB6C1',
                            gradientStart: '#FFE4E8'
                        }
                    },
                    boxShadow: { 'card': '0 10px 25px -5px rgba(255, 182, 193, 0.3)' }
                }
            }
        }
    </script>

    <style>
        body { 
            background: radial-gradient(circle at top left, #FFF1F3 0%, #FFE4E8 50%, #FFF1F3 100%);
            color: #8A5C68; 
            overflow-x: hidden;
        }
        
        /* สีกรอบเลื่อน */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #FFF1F3; }
        ::-webkit-scrollbar-thumb { background: #FFB6C1; border-radius: 10px; }

        /* Animation ตกแต่งพื้นหลัง */
        .bg-blob {
            position: absolute;
            width: 300px;
            height: 300px;
            background: linear-gradient(135deg, rgba(255,182,193,0.2) 0%, rgba(255,221,226,0.1) 100%);
            filter: blur(50px);
            border-radius: 50%;
            z-index: -1;
            animation: move 20s infinite alternate;
        }

        @keyframes move {
            from { transform: translate(-10%, -10%) rotate(0deg); }
            to { transform: translate(20%, 20%) rotate(360deg); }
        }

        .modal { transition: opacity 0.3s ease, visibility 0.3s ease; }
        .modal-content { transition: transform 0.3s ease; transform: translateY(20px) scale(0.95); }
        .modal.active .modal-content { transform: translateY(0) scale(1); }

        /* Floating elements */
        @keyframes float { 0%, 100% { transform: translateY(0px) rotate(0deg); } 50% { transform: translateY(-15px) rotate(5deg); } }
        .animate-float { animation: float 4s ease-in-out infinite; }
        .animate-float-delayed { animation: float 4s ease-in-out 2s infinite; }
        
        /* Pattern จุดเล็กๆ กระจาย */
        .dot-pattern {
            background-image: radial-gradient(#FFB6C1 0.5px, transparent 0.5px);
            background-size: 20px 20px;
            opacity: 0.3;
        }
    </style>
</head>

<body class="antialiased selection:bg-pinky selection:text-white min-h-screen relative">

    <div class="fixed inset-0 z-[-1] overflow-hidden pointer-events-none">
        <div class="bg-blob top-[-50px] left-[-50px]"></div>
        <div class="bg-blob bottom-[-50px] right-[-50px]" style="animation-delay: -5s; width: 400px; height: 400px;"></div>
        <div class="dot-pattern absolute inset-0"></div>
    </div>

    <svg width="0" height="0" class="hidden absolute pointer-events-none">
        <symbol id="icon-teddy" viewBox="0 0 24 24" fill="currentColor">
            <circle cx="6" cy="7" r="3.5" /><circle cx="6" cy="7" r="1.5" fill="#FFF1F3" />
            <circle cx="18" cy="7" r="3.5" /><circle cx="18" cy="7" r="1.5" fill="#FFF1F3" />
            <path d="M12 6C7 6 4 10 4 15C4 20 7 22.5 12 22.5C17 22.5 20 20 20 15C20 10 17 6 12 6Z" />
            <circle cx="8.5" cy="12" r="1.2" fill="#FFF1F3" /><circle cx="15.5" cy="12" r="1.2" fill="#FFF1F3" />
            <ellipse cx="12" cy="16.5" rx="4" ry="3" fill="#FFF1F3" /><ellipse cx="12" cy="15" rx="1.5" ry="1" fill="#8A5C68" />
            <path d="M12 16v1.5M10.5 18c.5.5 2.5.5 3 0" stroke="#8A5C68" stroke-width="1.2" fill="none" stroke-linecap="round" />
        </symbol>
    </svg>

    <div class="max-w-md mx-auto min-h-screen shadow-2xl relative overflow-hidden flex flex-col bg-cream/60 backdrop-blur-[2px]">
        
        <div class="absolute inset-0 pointer-events-none z-0">
            <svg class="absolute top-[15%] left-[5%] w-12 h-12 text-pinky-dark animate-float opacity-20" viewBox="0 0 24 24"><use href="#icon-teddy"></use></svg>
            <i data-lucide="heart" class="absolute top-[40%] right-[10%] w-8 h-8 text-pinky animate-float-delayed opacity-20"></i>
            <i data-lucide="sparkles" class="absolute bottom-[20%] left-[10%] w-10 h-10 text-pinky-dark animate-float opacity-20"></i>
        </div>

        <header class="bg-gradient-to-b from-white to-transparent pt-10 pb-8 px-6 relative rounded-b-[50px] z-10 flex items-center gap-5">
            <div class="shrink-0 relative">
                <div class="w-24 h-24 rounded-3xl border-[4px] border-white shadow-xl overflow-hidden bg-white flex items-center justify-center relative z-10 rotate-3">
                    <img src="logo_koyangi.png" alt="Koyangi Logo" class="w-full h-full object-cover" onerror="this.src='https://placehold.co/150x150/FFE4E8/FFB6C1?text=Koyangi';">
                </div>
                <div class="absolute -bottom-2 -right-2 w-10 h-10 bg-pinky-dark rounded-full flex items-center justify-center shadow-lg border-4 border-white z-20">
                    <i data-lucide="star" class="w-5 h-5 text-white fill-white"></i>
                </div>
            </div>
            <div class="flex-1 text-left relative z-10">
                <h1 class="text-[36px] leading-tight font-bold text-brown drop-shadow-sm">Koyangi</h1>
                <p class="text-brown-light text-[12px] font-medium bg-white/80 backdrop-blur-sm inline-block px-4 py-1.5 rounded-full shadow-sm border border-pinky-light">
                    ร้านเจ้าเหมียวยินดีให้บริการค้าบ 🌸
                </p>
            </div>
        </header>

        <main class="px-6 py-8 space-y-8 relative z-10 flex-grow">
            <section class="grid grid-cols-3 gap-4">
                <button onclick="openModal('graphics')" class="bg-white/70 backdrop-blur-md border-2 border-white rounded-[25px] p-4 flex flex-col items-center justify-center gap-2 shadow-sm hover:shadow-pinky/20 hover:-translate-y-1 transition-all">
                    <div class="w-12 h-12 rounded-2xl bg-pinky-light flex items-center justify-center text-pinky-dark shadow-inner"><i data-lucide="palette" class="w-6 h-6"></i></div>
                    <span class="text-[11px] font-bold text-brown text-center leading-tight">ป้าย โลโก้</span>
                </button>
                <button onclick="openModal('sheets')" class="bg-white/70 backdrop-blur-md border-2 border-white rounded-[25px] p-4 flex flex-col items-center justify-center gap-2 shadow-sm hover:shadow-pinky/20 hover:-translate-y-1 transition-all">
                    <div class="w-12 h-12 rounded-2xl bg-pinky-light flex items-center justify-center text-pinky-dark shadow-inner"><i data-lucide="table-2" class="w-6 h-6"></i></div>
                    <span class="text-[11px] font-bold text-brown text-center leading-tight">Sheet</span>
                </button>
                <button onclick="openModal('websites')" class="bg-white/70 backdrop-blur-md border-2 border-white rounded-[25px] p-4 flex flex-col items-center justify-center gap-2 shadow-sm hover:shadow-pinky/20 hover:-translate-y-1 transition-all">
                    <div class="w-12 h-12 rounded-2xl bg-pinky-light flex items-center justify-center text-pinky-dark shadow-inner"><i data-lucide="monitor" class="w-6 h-6"></i></div>
                    <span class="text-[11px] font-bold text-brown text-center leading-tight">Website</span>
                </button>
            </section>

            <section class="bg-white/40 backdrop-blur-md rounded-[35px] p-6 relative shadow-card border border-white/60">
                <h2 class="text-xl font-bold mb-6 text-center flex items-center justify-center gap-2 text-brown">
                    <i data-lucide="layers" class="w-5 h-5 text-pinky-dark"></i> Portfolio
                </h2>
                <div class="space-y-4">
                    <a href="#" class="bg-white/90 hover:bg-pinky-light transition-colors rounded-2xl p-4 flex items-center justify-between shadow-sm group">
                        <div class="flex items-center gap-4">
                            <div class="w-10 h-10 rounded-xl bg-cream flex items-center justify-center text-pinky-dark"><i data-lucide="image"></i></div>
                            <span class="font-bold text-brown">ดูตัวอย่างงานกราฟิก</span>
                        </div>
                        <i data-lucide="chevron-right" class="w-5 h-5 text-pinky group-hover:translate-x-1 transition-transform"></i>
                    </a>
                    <a href="#" class="bg-white/90 hover:bg-pinky-light transition-colors rounded-2xl p-4 flex items-center justify-between shadow-sm group">
                        <div class="flex items-center gap-4">
                            <div class="w-10 h-10 rounded-xl bg-cream flex items-center justify-center text-pinky-dark"><i data-lucide="globe"></i></div>
                            <span class="font-bold text-brown">ดูตัวอย่างเว็บไซต์</span>
                        </div>
                        <i data-lucide="chevron-right" class="w-5 h-5 text-pinky group-hover:translate-x-1 transition-transform"></i>
                    </a>
                </div>
            </section>

            <div class="bg-gradient-to-r from-pinky-dark to-pinky rounded-2xl p-4 shadow-lg flex items-center justify-between text-white">
                <div class="flex items-center gap-3">
                    <i data-lucide="calendar-clock" class="w-6 h-6"></i>
                    <div>
                        <p class="text-[10px] opacity-80 leading-none">Work Status</p>
                        <p class="text-sm font-bold">เช็คคิวงานปัจจุบัน</p>
                    </div>
                </div>
                <span class="text-[10px] bg-white/20 px-3 py-1.5 rounded-full font-bold border border-white/30 backdrop-blur-sm">ว่าง 2 คิว</span>
            </div>

            <section class="bg-white/80 backdrop-blur-sm rounded-3xl p-6 shadow-card border-2 border-pinky-light/30">
                <h3 class="font-bold mb-4 flex items-center gap-2 text-lg text-brown"><i data-lucide="clipboard-list" class="w-5 h-5 text-pinky-dark"></i> วิธีการสั่งซื้อ</h3>
                <div class="space-y-4">
                    <div class="flex gap-4 items-center">
                        <span class="flex-shrink-0 w-8 h-8 rounded-full bg-pinky text-white flex items-center justify-center font-bold text-sm">1</span>
                        <p class="text-sm text-brown-light font-medium">คุยรายละเอียดและบรีฟงาน</p>
                    </div>
                    <div class="flex gap-4 items-center">
                        <span class="flex-shrink-0 w-8 h-8 rounded-full bg-pinky text-white flex items-center justify-center font-bold text-sm">2</span>
                        <p class="text-sm text-brown-light font-medium">มัดจำหรือชำระเต็มจำนวน</p>
                    </div>
                    <div class="flex gap-4 items-center">
                        <span class="flex-shrink-0 w-8 h-8 rounded-full bg-pinky text-white flex items-center justify-center font-bold text-sm">3</span>
                        <p class="text-sm text-brown-light font-medium">รอรับผลงานสุดน่ารักได้เลย</p>
                    </div>
                </div>
            </section>
        </main>

        <footer class="bg-white/60 backdrop-blur-md pt-10 pb-8 px-6 rounded-t-[50px] text-center border-t border-white">
            <h2 class="text-[14px] font-bold mb-6 text-brown tracking-widest uppercase">Keep in touch</h2>
            <div class="flex justify-center gap-4 mb-8">
                <a href="#" class="w-12 h-12 bg-brown text-white rounded-full flex items-center justify-center hover:scale-110 transition-transform shadow-lg"><i data-lucide="facebook"></i></a>
                <a href="#" class="w-12 h-12 bg-pinky-dark text-white rounded-full flex items-center justify-center hover:scale-110 transition-transform shadow-lg"><i data-lucide="instagram"></i></a>
                <a href="#" class="w-12 h-12 bg-white text-brown border-2 border-brown rounded-full flex items-center justify-center hover:scale-110 transition-transform shadow-lg"><i data-lucide="message-circle"></i></a>
            </div>
            <p class="text-[10px] text-brown-light font-medium opacity-60">© 2026 KOYANGI STORE. CRAFTED WITH LOVE 🐾</p>
        </footer>
    </div>

    <div id="portfolioModal" class="modal fixed inset-0 z-[100] flex items-center justify-center bg-brown-dark/40 backdrop-blur-md invisible opacity-0 p-4">
        <div class="modal-content bg-white/95 w-full max-w-sm rounded-[40px] shadow-2xl overflow-hidden border-4 border-white">
            <div class="p-6 flex justify-between items-center bg-pinky-light/50">
                <h3 id="modalTitle" class="font-bold text-lg text-brown"></h3>
                <button onclick="closeModal()" class="w-10 h-10 bg-white rounded-full flex items-center justify-center shadow-sm text-brown"><i data-lucide="x"></i></button>
            </div>
            <div id="modalLinks" class="p-8 max-h-[70vh] overflow-y-auto"></div>
        </div>
    </div>

    <script>
        lucide.createIcons();
        // (ส่วน Script portfolioData และ Modal Function เหมือนเดิม)
        function openModal(cat) { 
            document.getElementById('modalTitle').innerText = cat === 'graphics' ? 'ป้าย โลโก้ ลายน้ำ' : cat;
            document.getElementById('portfolioModal').classList.remove('invisible', 'opacity-0');
            document.getElementById('portfolioModal').classList.add('active');
            document.body.style.overflow = 'hidden';
        }
        function closeModal() {
            const modal = document.getElementById('portfolioModal');
            modal.classList.remove('active');
            modal.classList.add('opacity-0');
            setTimeout(() => { modal.classList.add('invisible'); document.body.style.overflow = ''; }, 300);
        }
    </script>
</body>
</html>
